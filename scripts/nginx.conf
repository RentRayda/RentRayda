# /etc/nginx/sites-available/rentrayda
upstream api {
    server 127.0.0.1:3001;
    keepalive 64;
}
upstream web {
    server 127.0.0.1:3000;
    keepalive 64;
}

# Rate limit zone
limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;

server {
    listen 443 ssl http2;
    server_name rentrayda.ph;

    # SSL managed by Cloudflare Full Strict + Let's Encrypt via Coolify
    ssl_certificate /etc/letsencrypt/live/rentrayda.ph/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rentrayda.ph/privkey.pem;

    client_max_body_size 10M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # API routes → Hono
    location /api/ {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        limit_req zone=api burst=40 nodelay;
    }

    # Static assets → filesystem (bypass Node.js)
    location /_next/static/ {
        alias /home/deploy/apps/web/.next/static/;
        expires 365d;
        access_log off;
    }

    # Everything else → Next.js
    location / {
        proxy_pass http://web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        add_header X-Accel-Buffering no;
    }
}

server {
    listen 80;
    server_name rentrayda.ph;
    return 301 https://$host$request_uri;
}
